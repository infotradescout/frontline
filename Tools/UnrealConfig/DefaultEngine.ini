; ============================================================================
; Frontline — DefaultEngine.ini
; Low-spec-first rendering lock for UE 5.7.4
;
; HOW TO USE:
;   After you create the Unreal project, this file goes into:
;     UnrealProject/Frontline/Config/DefaultEngine.ini
;   The setup script (Tools/setup_unreal_project.ps1) does this for you.
;
; WHAT IT DOES:
;   - Forces forward shading (cheaper than the default deferred renderer)
;   - Disables Lumen (real-time global illumination — too expensive)
;   - Disables Nanite (virtualized geometry — not needed at our poly counts)
;   - Locks anti-aliasing to FXAA (cheapest)
;   - Disables ray tracing entirely
;   - Disables auto-exposure (no eye-adaptation flicker)
;   - Disables motion blur, bloom-heavy effects, mesh distance fields
; ============================================================================

[/Script/Engine.RendererSettings]
; --- Shading path ---
r.ForwardShading=True
r.AllowStaticLighting=True

; --- Global Illumination (Lumen OFF) ---
r.DynamicGlobalIlluminationMethod=0
r.ReflectionMethod=0
r.Lumen.HardwareRayTracing=False
r.Lumen.ScreenProbeGather=False

; --- Nanite OFF ---
r.Nanite.ProjectEnabled=False

; --- Ray tracing OFF ---
r.RayTracing=False
r.RayTracing.Geometry.StaticMeshes=False
r.RayTracing.Geometry.SkeletalMeshes=False
r.RayTracing.Shadows=False
r.RayTracing.Reflections=False

; --- Anti-aliasing: FXAA (cheapest) ---
r.AntiAliasingMethod=1
r.TemporalAA.Upsampling=False

; --- Auto-exposure / tone mapping ---
r.DefaultFeature.AutoExposure=False
r.DefaultFeature.AutoExposure.Method=2
r.DefaultFeature.MotionBlur=False
r.DefaultFeature.LensFlare=False
r.DefaultFeature.Bloom=True
r.DefaultFeature.AmbientOcclusion=False
r.DefaultFeature.AmbientOcclusionStaticFraction=False

; --- Mesh distance fields OFF (saves memory + build time) ---
r.GenerateMeshDistanceFields=False
r.DistanceFieldShadowing=False
r.DistanceFieldAO=False

; --- Shadows: keep cheap ---
r.Shadow.CSM.MaxCascades=2
r.Shadow.MaxResolution=1024
r.Shadow.RadiusThreshold=0.06

; --- Mobile / scalability hints (we don't ship mobile, but keeps things lean) ---
r.SkinCache.CompileShaders=False

[/Script/Engine.GameUserSettings]
; --- Default scalability: LOW everywhere ---
sg.ResolutionQuality=75
sg.ViewDistanceQuality=0
sg.AntiAliasingQuality=0
sg.ShadowQuality=0
sg.GlobalIlluminationQuality=0
sg.ReflectionQuality=0
sg.PostProcessQuality=0
sg.TextureQuality=0
sg.EffectsQuality=0
sg.FoliageQuality=0
sg.ShadingQuality=0

[SystemSettings]
; --- Frame rate ---
t.MaxFPS=60
r.VSync=0

; --- Streaming pool (small project, keep tight) ---
r.Streaming.PoolSize=1000

; --- Editor scalability — keep dev work honest at low settings ---
r.ScreenPercentage=100
